name: Windows Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-qt5-base
          mingw-w64-ucrt-x86_64-qt5-svg
          mingw-w64-ucrt-x86_64-qt5-tools
          mingw-w64-ucrt-x86_64-sqlite3
          mingw-w64-ucrt-x86_64-pkg-config
          mingw-w64-ucrt-x86_64-kwidgetsaddons
          mingw-w64-ucrt-x86_64-kcoreaddons
          mingw-w64-ucrt-x86_64-extra-cmake-modules

    - name: Force Qt5 by removing Qt6 cmake files
      shell: msys2 {0}
      run: rm -rf /ucrt64/lib/cmake/Qt6

    - name: Build with cmake
      shell: msys2 {0}
      run: |
        cd $GITHUB_WORKSPACE
        mkdir build && cd build
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH=/ucrt64 \
          -DQt5_DIR=/ucrt64/lib/cmake/Qt5 \
          -DQT_VERSION_MAJOR=5 \
          -DBUILD_TESTING=OFF \
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
          ..
        ninja

    - name: Deploy Qt DLLs
      shell: msys2 {0}
      run: |
        mkdir -p $GITHUB_WORKSPACE/deploy
        cp $GITHUB_WORKSPACE/build/qelectrotech.exe $GITHUB_WORKSPACE/deploy/
        windeployqt --release $GITHUB_WORKSPACE/deploy/qelectrotech.exe
        cp /ucrt64/bin/libgcc_s_seh-1.dll $GITHUB_WORKSPACE/deploy/ || true
        cp /ucrt64/bin/libstdc++-6.dll $GITHUB_WORKSPACE/deploy/ || true
        cp /ucrt64/bin/libwinpthread-1.dll $GITHUB_WORKSPACE/deploy/ || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qelectrotech-windows
        path: deploy/
